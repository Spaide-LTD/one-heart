<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="page.contactResponses.title">Contact Responses | OneHeart Command</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="bg-animation"></div>
    <div class="grid-overlay"></div>
    
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                  <div class="logo-icon"><img src="../images/logo.jpeg" alt="OneHeart Logo" style="width: 100%;"></div>
                <div class="logo-text">
                    <h1 data-i18n="brand.name">ONEHEART</h1>
                    <span data-i18n="brand.tag">COMMAND</span>
                </div>
            </div>

            <nav>
                <a href="index.html" class="nav-item">
                    <i class="fa-solid fa-house"></i> <span data-i18n="nav.dashboard">Dashboard</span>
                </a>

                <div class="nav-section">
                    <div class="nav-label" data-i18n="nav.section.events">Events</div>
                    <a href="event-manager.html" class="nav-item"><i class="fa-solid fa-list-check"></i> <span data-i18n="nav.eventManager">Event Manager</span></a>
                    <a href="past-events.html" class="nav-item"><i class="fa-solid fa-clock-rotate-left"></i> <span data-i18n="nav.pastEvents">Past Events</span></a>
                </div>

                <div class="nav-section">
                    <div class="nav-label" data-i18n="nav.section.website">Website</div>
                    <a href="holiday-themes.html" class="nav-item"><i class="fa-solid fa-holly-berry"></i> <span data-i18n="nav.holidayThemes">Holiday Themes</span></a>
                </div>

                <div class="nav-section">
                    <div class="nav-label" data-i18n="nav.section.communication">Communication</div>
                    <a href="contact-responses.html" class="nav-item active"><i class="fa-regular fa-envelope"></i> <span data-i18n="nav.contactResponses">Contact Responses</span></a>
                    <a href="whatsapp-chat.html" class="nav-item"><i class="fa-brands fa-whatsapp"></i> <span data-i18n="nav.whatsappChat">WhatsApp Chat</span></a>
                </div>

                <div class="nav-section">
                    <div class="nav-label" data-i18n="nav.section.system">System</div>
                    <a href="settings.html" class="nav-item"><i class="fa-solid fa-gear"></i> <span data-i18n="nav.settings">Settings</span></a>
                </div>
            </nav>
        </aside>

        <main class="main-wrapper">
            <header class="top-header">
                <div class="header-actions">
                    <!-- removed unused header controls -->
                    <button class="action-btn" id="logoutBtn" onclick="window.logout()">
                      <i class="fa-solid fa-right-from-bracket"></i> <span data-i18n="logout">Logout</span>
                    </button>
                </div>
            </header>

            <div class="page-container">
                <div class="page-header">
                    <div>
                        <h1 class="page-title" data-i18n="page.contactResponses.title">CONTACT RESPONSES</h1>
                        <p class="page-subtitle" data-i18n="page.contactResponses.subtitle">INBOX FOR WEBSITE FORMS</p>
                    </div>
                </div>

                <div class="glass-card">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th data-i18n="table.from">From</th>
                                <th data-i18n="table.email">Email</th>
                                <th data-i18n="table.date">Date Received</th>
                                <th data-i18n="table.status">Status</th>
                                <th data-i18n="table.actions">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="messagesBody">
                            <!-- Messages rendered by JS -->
                        </tbody>
                    </table>
                    
                    <div id="emptyState" style="display: none; text-align: center; padding: 40px; color: var(--text-muted);">
                        <p data-i18n="contact.empty">No contact messages yet.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- View Modal (with data-i18n) -->
    <div id="viewModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: var(--bg-card); border: 1px solid var(--border-secondary); border-radius: var(--radius-lg); padding: 24px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border-secondary);">
                <h3 style="margin: 0; color: var(--text-primary);" data-i18n="modal.title">Message Details</h3>
                <button id="closeModal" style="background: none; border: none; color: var(--text-muted); font-size: 24px; cursor: pointer;" data-i18n="modal.close" aria-label="Close">&times;</button>
            </div>
            <div id="modalContent" style="color: var(--text-secondary); line-height: 1.6;">
                <!-- Content injected by JS with data-i18n -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../components/notifications.js"></script>
    <script src="../js/contact-responses.js"></script>
    <script src="../js/settings.js"></script>
</body>
</html>
