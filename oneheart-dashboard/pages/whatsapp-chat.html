<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="whatsapp_chat">WhatsApp Chat | OneHeart Command</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/whatsapp.css">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>

<body>
  <div class="bg-animation"></div>
  <div class="grid-overlay"></div>

  <div class="app-container">
    <aside class="sidebar">
      <div class="logo">
        <div class="logo-icon"><img src="../images/logo.jpeg" alt="OneHeart Logo" style="width: 100%;"></div>
        <div class="logo-text">
          <h1 data-i18n="brand.name">ONEHEART</h1>
          <span data-i18n="brand.tag">COMMAND</span>
        </div>
      </div>

      <nav>
        <a href="index.html" class="nav-item">
          <i class="fa-solid fa-house"></i>
          <span data-i18n="dashboard">Dashboard</span>
        </a>

        <div class="nav-section">
          <div class="nav-label" data-i18n="events_section">Events</div>

          <a href="event-manager.html" class="nav-item">
            <i class="fa-solid fa-list-check"></i>
            <span data-i18n="event_manager">Event Manager</span>
          </a>
          <a href="past-events.html" class="nav-item">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <span data-i18n="past_events">Past Events</span>
          </a>
        </div>

        <div class="nav-section">
          <div class="nav-label" data-i18n="website_section">Website</div>

          <a href="holiday-themes.html" class="nav-item">
            <i class="fa-solid fa-holly-berry"></i>
            <span data-i18n="holiday_themes">Holiday Themes</span>
          </a>
        </div>

        <div class="nav-section">
          <div class="nav-label" data-i18n="communication_section">Communication</div>
          <a href="contact-responses.html" class="nav-item">
            <i class="fa-regular fa-envelope"></i>
            <span data-i18n="contact_responses">Contact Responses</span>
          </a>
          <a href="whatsapp-chat.html" class="nav-item active">
  <i class="fa-brands fa-whatsapp"></i>
  <span data-i18n="whatsapp_chat">WhatsApp Chat</span>
  <span id="humanNeededBadge" class="nav-alert-badge" style="display:none;">0</span>
</a>
        </div>

        <div class="nav-section">
          <div class="nav-label" data-i18n="system_section">System</div>
          <a href="settings.html" class="nav-item">
            <i class="fa-solid fa-gear"></i>
            <span data-i18n="settings">Settings</span>
          </a>
        </div>
      </nav>
    </aside>

    <main class="main-wrapper">
      <header class="top-header">
        <div class="top-title">
          <h1>WhatsApp Chat</h1>
          <p>Direct Client Communication</p>
        </div>

        <div class="header-actions">
          <button class="action-btn" id="logoutBtn" onclick="window.logout()">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span data-i18n="logout">Logout</span>
          </button>
        </div>
      </header>

        <!-- Enhanced WhatsApp Chat Container -->
        <div class="chat-container">
          <!-- Chat Sidebar (Contact List) -->
          <div class="chat-sidebar">
            <div class="chat-search">
              <input class="input" id="searchInput" data-i18n-placeholder="chat.search" placeholder="Search chats...">
            </div>
            <div class="chat-list" id="chatList">
              <!-- Chat contacts rendered by JS -->
            </div>
          </div>

          <!-- Chat Main Area -->
          <div class="chat-main">
            <div class="chat-header">
              <div class="chat-header-left">
                <div class="chat-avatar" id="chatAvatar">--</div>
                <div class="chat-info">
                  <h3 id="chatContactName">Select a contact</h3>
                  <div class="chat-status" id="chatStatus">
                    <span class="online-dot"></span>
                    <span>Online</span>
                  </div>
                </div>
              </div>

              <div class="chat-header-actions">
                <button class="chat-action-btn" id="humanTransferBtn" title="Return chat to AI" style="display:none;">
                  <i class="fa-solid fa-rotate-left"></i>
                  <span>Return To AI</span>
                </button>
              </div>
            </div>

            <!-- Info Bar (shows current agent type) -->
            <div class="info-bar" id="infoBar">
    <span id="agentTypeDisplay">
        Currently handled by: <strong>AI Assistant</strong>
    </span>
</div>

            <div class="chat-body" id="chatBody">
              <div class="empty-state">
                <i class="fa-regular fa-comment-dots"></i>
                <p data-i18n="chat.welcome">Select a contact to start chatting</p>
              </div>
            </div>

            <div class="chat-input-area">
              <div class="input-container">
                <input class="input" id="messageInput" data-i18n-placeholder="chat.typeMessage"
                  placeholder="Type a message..." disabled>
                <div class="input-actions">
    <button class="send-btn" id="sendBtn" disabled>
        <i class="fa-solid fa-paper-plane"></i>
    </button>
</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../components/notifications.js"></script>
  <script src="../js/settings.js"></script>
  <script src="../js/whatsapp-chat.js"></script>

</body>

</html>
